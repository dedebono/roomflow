services:
  postgres:
    image: postgres:16-alpine
    container_name: roomflow-postgres
    restart: always
    environment:
      POSTGRES_USER: roomflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roomflow}
      POSTGRES_DB: roomflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roomflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roomflow-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://roomflow:${POSTGRES_PASSWORD:-roomflow}@postgres:5432/roomflow?schema=public
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
      STORAGE_TYPE: LOCAL
      EMAIL_ENABLED: "false"
      EMAIL_FROM: noreply@roomflow.local
      WAHA_ENABLED: "true"
      WAHA_API_URL: ${WAHA_API_URL}
      WAHA_SESSION: ${WAHA_SESSION:-default}
      WAHA_API_KEY: ${WAHA_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'
    volumes:
      - uploads_data:/app/dist/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://room.ytcb.org/api
    container_name: roomflow-frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: https://room.ytcb.org/api
    depends_on:
      - backend
    ports:
      - '3001:3000'

  nginx:
    image: nginx:alpine
    container_name: roomflow-nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - '80:80'
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:
